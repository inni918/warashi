<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Warashi</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Fix stale localStorage: if model dir/name is "undefined", clear it so server config is used
      if(localStorage.getItem('modelDir')==='undefined'||localStorage.getItem('modelName')==='undefined'){
        localStorage.removeItem('modelDir');
        localStorage.removeItem('modelName');
        console.log('[fix] cleared stale undefined model from localStorage');
      }
      // Remote-access fix: baseUrl/wsUrl/backgroundUrl are cached in localStorage. If a stale
      // value points at a different host (e.g. an earlier "localhost" test), a remote device
      // would try to load an unreachable host and fail to fetch the background / Live2D model.
      // Clear any value that doesn't match the current host so URLs follow the current origin.
      try {
        var __curHost = location.host;
        ['baseUrl','wsUrl','backgroundUrl'].forEach(function(k){
          var v = localStorage.getItem(k);
          if (v && v.indexOf(__curHost) < 0) {
            localStorage.removeItem(k);
            console.log('[fix] cleared stale ' + k + ' (was for another host): ' + v);
          }
        });
        // 對話結束後自動重開麥克風（連續對話，不用每次手動按）。設一次，之後可在設定面板改
        if (!localStorage.getItem('__micAutoSet')) {
          localStorage.setItem('autoStartMicOnConvEnd', 'true');
          localStorage.setItem('__micAutoSet', '1');
          console.log('[fix] auto-restart mic on conversation end enabled');
        }
        // 自然對談（barge-in）：麥克風一進來就自動開，且 AI 講話時麥克風保持開不自動關，
        // 這樣可以邊聽邊插話打斷她，不用等麥克風變綠燈才能講（像兩人對話）。
        // App 內建回音抑制（AI 不會聽到自己的聲音）避免她講話誤觸打斷。設一次，設定面板仍可改。
        if (!localStorage.getItem('__bargeInSet')) {
          localStorage.setItem('autoStartMicOn', 'true');  // 進來就開麥（true）
          localStorage.setItem('autoStopMic', 'false');    // AI 說話時麥克風不關（false=可打斷）
          localStorage.setItem('__bargeInSet', '1');
          console.log('[fix] barge-in enabled: mic stays open during AI speech');
        }
        // 主動說話：你安靜一段時間後她會自己開口（內建功能，前端閒置計時觸發 ai-speak-signal）。
        // 開關設一次（allowProactiveSpeak + 舉手按鈕 allowButtonTrigger），之後設定面板可關。
        if (!localStorage.getItem('__proactiveSetV3')) {
          var __ps = {};
          try { __ps = JSON.parse(localStorage.getItem('proactiveSpeakSettings') || '{}'); } catch(e){}
          __ps.allowProactiveSpeak = true;
          __ps.allowButtonTrigger = true;
          localStorage.setItem('proactiveSpeakSettings', JSON.stringify(__ps));
          localStorage.setItem('__proactiveSetV3', '1');
          console.log('[fix] proactive speak enabled');
        }
        // 間隔每次載入隨機（25~45 分），避免固定節奏太機械（前端計時只在載入時讀值，故 per-load 隨機）。
        try {
          var __ps2 = JSON.parse(localStorage.getItem('proactiveSpeakSettings') || '{}');
          if (__ps2.allowProactiveSpeak) {
            var __lo = 1500, __hi = 2700; // 25~45 分
            __ps2.idleSecondsToSpeak = Math.floor(__lo + Math.random() * (__hi - __lo));
            localStorage.setItem('proactiveSpeakSettings', JSON.stringify(__ps2));
            console.log('[fix] proactive idle randomized to ' + __ps2.idleSecondsToSpeak + 's this load');
          }
        } catch(e){}
        // VAD 調校：講話中途停頓不要馬上被切斷（redemptionFrames 預設 35 偏短，講一半換氣就被切）。
        // 調大 redemptionFrames（停頓容忍更久）+ 降 negativeSpeechThreshold（更不易誤判靜音）。設一次，設定面板仍可改。
        if (!localStorage.getItem('__vadTuned2')) {
          localStorage.setItem('vadSettings', JSON.stringify({positiveSpeechThreshold:50, negativeSpeechThreshold:28, redemptionFrames:120}));
          localStorage.setItem('__vadTuned2', '1');
          console.log('[fix] VAD tuned: redemptionFrames ->120 (~4s pause tolerance), 長句中途停頓不被切斷/自我打斷');
        }
      } catch(e){}
      // Audio autoplay unlock. Browsers block WebSocket-triggered new Audio().play()
      // unless the user has interacted with the page. Click-to-start overlay = one gesture.
      window.__SILENT_WAV='data:audio/wav;base64,UklGRkQDAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YSADAAAAAAAA';
      window.__unlockAudio=function(){
        try{ var a=new Audio(window.__SILENT_WAV); a.volume=0; var p=a.play(); if(p&&p.catch)p.catch(function(){}); }catch(e){}
        var ov=document.getElementById('audio-unlock-overlay');
        if(ov)ov.remove();
        document.removeEventListener('pointerdown',window.__unlockAudio);
        document.removeEventListener('keydown',window.__unlockAudio);
        console.log('[fix] audio autoplay unlocked');
      };
      document.addEventListener('pointerdown',window.__unlockAudio);
      document.addEventListener('keydown',window.__unlockAudio);

      // Capture the VTuber WebSocket WITHOUT replacing the constructor (the previous
      // constructor-replace patch broke the settings panel). Only wrap prototype.send
      // to record the live socket instance — leaves instanceof/constructor intact.
      (function(){
        var _origSend = WebSocket.prototype.send;
        WebSocket.prototype.send = function(){
          try{ if(this && this.url && String(this.url).indexOf('client-ws')>=0) window.__vtWS = this; }catch(e){}
          return _origSend.apply(this, arguments);
        };
      })();
      window.__toast=function(msg){
        var t=document.createElement('div');
        t.textContent=msg;
        t.style.cssText='position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:99998;background:rgba(0,0,0,.82);color:#fff;padding:10px 18px;border-radius:8px;font-family:system-ui,sans-serif;font-size:14px;pointer-events:none';
        document.body.appendChild(t);
        setTimeout(function(){t.remove();},2600);
      };
      window.__switchVoice=function(file,label,btn){
        var ws=window.__vtWS;
        if(!ws || ws.readyState!==1){ window.__toast('連線還沒就緒，先講一句話或等一兩秒再點'); return; }
        ws.send(JSON.stringify({type:'switch-config', file:file}));
        var btns=document.querySelectorAll('.voice-btn');
        for(var i=0;i<btns.length;i++){ btns[i].style.background='rgba(255,255,255,.14)'; btns[i].style.color='#fff'; }
        btn.style.background='#4ade80'; btn.style.color='#06281a';
        window.__toast('已切換到「'+label+'」（約 1-2 秒生效）');
      };
    </script>
    <script type="module" crossorigin src="./assets/main-sL8a8W3v.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/main-QEkl09-0.css">
  </head>

  <body>
    <div id="root"></div>

    <!-- 想要多語音/多角色切換按鈕，可用 window.__switchVoice('your_character.yaml','標籤',this) 自行加 -->

    <div id="audio-unlock-overlay" onclick="window.__unlockAudio()" style="position:fixed;inset:0;z-index:99999;background:rgba(18,18,40,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent">
      <div style="font-size:28px;font-weight:600">點擊任意處開始</div>
      <div style="font-size:15px;margin-top:14px;opacity:.65">啟用語音播放（瀏覽器安全限制）</div>
    </div>
  </body>
</html>
